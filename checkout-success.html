<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Barwaaqo Skills</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-shell" style="grid-template-columns:1fr;max-width:520px;margin:80px auto;">
    <div class="auth-panel" style="padding:40px;text-align:center;">
      <div style="font-size:3rem;color:var(--yellow);margin-bottom:16px;"><i class="fa-solid fa-circle-check"></i></div>
      <h1 id="checkoutTitle">Confirming payment…</h1>
      <p id="checkoutMessage" style="color:var(--text-muted);margin:16px 0 24px;">Please wait while we unlock your course.</p>
      <a href="dashboard.html" class="btn btn-yellow hidden" id="checkoutContinue">Continue to dashboard</a>
    </div>
  </div>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <script src="js/lib/config.js"></script>
  <script src="js/lib/api.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/payments.js"></script>
  <script src="js/lib/progress.js"></script>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const sessionId = params.get("session_id");
      const title = document.getElementById("checkoutTitle");
      const msg = document.getElementById("checkoutMessage");
      const btn = document.getElementById("checkoutContinue");

      if (!window.BSAuth?.isLoggedIn?.()) {
        title.textContent = "Sign in required";
        msg.textContent = "Log in to finish activating your purchase.";
        btn.textContent = "Log in";
        btn.href = "login.html?next=" + encodeURIComponent(location.href);
        btn.classList.remove("hidden");
        return;
      }

      if (!sessionId) {
        title.textContent = "Invalid checkout";
        msg.textContent = "No payment session was found.";
        btn.classList.remove("hidden");
        return;
      }

      try {
        const res = await window.BSPayments.confirmCheckout(sessionId);
        await window.BSProgress.syncFromApi();
        title.textContent = "Payment successful";
        msg.textContent = res.course_id
          ? `You now have lifetime access. Start learning whenever you're ready.`
          : "Your purchase is confirmed.";
        btn.textContent = res.course_id ? "Start course" : "Go to dashboard";
        btn.href = res.course_id
          ? `course-learn.html?id=${res.course_id}`
          : "dashboard.html";
        btn.classList.remove("hidden");
      } catch (e) {
        title.textContent = "Confirmation pending";
        msg.textContent = e.data?.message || "Payment received — refresh in a moment or contact support if access is missing.";
        btn.classList.remove("hidden");
      }
    })();
  </script>
</body>
</html>
