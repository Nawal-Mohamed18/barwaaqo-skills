# Render Blueprint — one-click: https://render.com/deploy?repo=https://github.com/Nawal-Mohamed18/barwaaqo-skills
services:
  - type: web
    name: barwaaqo-skills-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: barwaaqo-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: barwaaqo-skills-api.onrender.com
      - key: CORS_ORIGINS
        value: https://nawal-mohamed18.github.io
      - key: FRONTEND_URL
        value: https://nawal-mohamed18.github.io/barwaaqo-skills/

databases:
  - name: barwaaqo-db
    plan: free
