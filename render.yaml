# Render Blueprint — deploy the Django API (free tier).
# Connect this repo at https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: barwaaqo-skills-api
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: barwaaqo-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: barwaaqo-skills-api.onrender.com
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: barwaaqo-db
    plan: free
